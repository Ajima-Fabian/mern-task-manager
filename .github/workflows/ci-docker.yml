name: CI + Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ========================
      # BACKEND CHECK
      # ========================
      - name: Install backend deps
        working-directory: ./backend
        run: npm install

      - name: Backend syntax check
        working-directory: ./backend
        run: node -c server.js

      # ========================
      # FRONTEND CHECK
      # ========================
      - name: Install frontend deps
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # ========================
      # DOCKER SETUP
      # ========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ========================
      # BUILD + PUSH BACKEND
      # ========================
      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-task-backend:latest ./backend

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-task-backend:latest

      # ========================
      # BUILD + PUSH FRONTEND
      # ========================
      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-task-frontend:latest ./frontend

      - name: Push frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-task-frontend:latest
